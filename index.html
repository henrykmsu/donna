<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donna</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />

  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Donna" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #f9f9f8;
      color: #1a1a18;
      min-height: 100vh;
    }

    .donna-header {
      background: #5b6f84;
      padding: 2rem 1.5rem 2rem;
    }

    .donna-header-inner {
      max-width: 680px;
      margin: 0 auto;
    }

    .donna-headline {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-wrap: wrap;
      font-size: 14px;
      font-weight: 300;
      color: #92aec4;
      letter-spacing: 0.01em;
    }

    .donna-headline-name {
      font-size: 22px;
      font-weight: 300;
      color: #eaf0f6;
      letter-spacing: 1px;
    }

    .donna-body {
      max-width: 680px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      color: #9b9b96;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 2rem;
    }

    .tool-card {
      background: #ffffff;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      flex-direction: column;
      gap: 8px;
      text-decoration: none;
    }

    .tool-card:hover {
      border-color: rgba(91,111,132,0.4);
      background: #f4f7fa;
    }

    .tool-card-icon { font-size: 20px; color: #5b6f84; }
    .tool-card-name { font-size: 15px; font-weight: 500; color: #1a1a18; }
    .tool-card-desc { font-size: 13px; color: #6b6b67; line-height: 1.5; }

    .tool-card-badge {
      display: inline-block;
      margin-top: 4px;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 99px;
      background: #dde7f0;
      color: #3b4f61;
      align-self: flex-start;
    }

    .tool-card-badge.coming {
      background: #f1efe8;
      color: #9b9b96;
    }

    .ryan-card {
      background: #ffffff;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 2rem;
      display: inline-flex;
      flex-direction: column;
      gap: 10px;
    }

    .ryan-age-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .ryan-stat {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .ryan-number {
      font-size: 36px;
      font-weight: 600;
      color: #1a1a18;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .ryan-unit {
      font-size: 13px;
      font-weight: 500;
      color: #a0a09a;
    }

    .ryan-sep {
      font-size: 20px;
      font-weight: 300;
      color: #e8e8e5;
      line-height: 1;
    }

    .ryan-updated {
      font-size: 11px;
      color: #c0c0ba;
    }

    .donna-footer {
      font-size: 12px;
      color: #9b9b96;
      margin-top: 2rem;
      border-top: 0.5px solid rgba(0,0,0,0.1);
      padding-top: 1.25rem;
    }
  </style>
</head>
<body>

  <div class="donna-header">
    <div class="donna-header-inner">
      <div class="donna-headline">I'm <span class="donna-headline-name" style="margin-right:-3px">Donna</span>, I know everything 😉</div>
    </div>
  </div>

  <div class="donna-body">
    <div class="section-label">Widgets</div>
    <div class="ryan-card">
      <div class="section-label" style="margin-bottom:0; color:#b0b0aa;">Ryan's age</div>
      <div class="ryan-age-row">
        <div class="ryan-stat">
          <div class="ryan-number" id="ryan-weeks">—</div>
          <div class="ryan-unit">weeks</div>
        </div>
        <div class="ryan-sep">·</div>
        <div class="ryan-stat">
          <div class="ryan-number" id="ryan-days">—</div>
          <div class="ryan-unit">days</div>
        </div>
      </div>
      <div class="ryan-updated" id="ryan-updated"></div>
    </div>

    <div class="section-label">Tools</div>
    <div class="tool-grid">
      <a href="/donna/inventory" class="tool-card">
        <i class="ti ti-clock-exclamation tool-card-icon" aria-hidden="true"></i>
        <div class="tool-card-name">Inventory</div>
        <div class="tool-card-desc">Track food, medicine, and household items before they go bad.</div>
        <span class="tool-card-badge">Live</span>
      </a>
      <div class="tool-card">
        <i class="ti ti-plus tool-card-icon" aria-hidden="true"></i>
        <div class="tool-card-name">Add a tool</div>
        <div class="tool-card-desc">Your next Donna tool will appear here.</div>
        <span class="tool-card-badge coming">Coming soon</span>
      </div>
    </div>

    <div class="donna-footer">
      Donna &mdash; built for the Su Family &bull; Updated June 2026
    </div>
  </div>

  <script>
    const DOB = new Date("2026-06-10");
    const now = new Date();
    const totalDays = Math.floor((now - DOB) / (1000 * 60 * 60 * 24));
    document.getElementById("ryan-weeks").textContent = Math.floor(totalDays / 7);
    document.getElementById("ryan-days").textContent = totalDays % 7;
    document.getElementById("ryan-updated").textContent =
      "as of " + now.toLocaleDateString("en-US", { month: "short", day: "numeric" });
  </script>
</body>
</html>
