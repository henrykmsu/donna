<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donna</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #f9f9f8;
      color: #1a1a18;
      min-height: 100vh;
    }

    .donna-wrap {
      padding: 2.5rem 1.5rem 4rem;
      max-width: 680px;
      margin: 0 auto;
    }

    .donna-header { margin-bottom: 2.5rem; }

    .donna-wordmark {
      font-size: 22px;
      font-weight: 500;
      color: #1a1a18;
      letter-spacing: -0.3px;
    }

    .donna-tagline {
      font-size: 14px;
      color: #6b6b67;
      margin-top: 4px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      color: #9b9b96;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 2rem;
    }

    .tool-card {
      background: #ffffff;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      flex-direction: column;
      gap: 8px;
      text-decoration: none;
    }

    .tool-card:hover {
      border-color: rgba(0,0,0,0.25);
      background: #f4f4f2;
    }

    .tool-card-icon {
      font-size: 20px;
      color: #6b6b67;
    }

    .tool-card-name {
      font-size: 15px;
      font-weight: 500;
      color: #1a1a18;
    }

    .tool-card-desc {
      font-size: 13px;
      color: #6b6b67;
      line-height: 1.5;
    }

    .tool-card-badge {
      display: inline-block;
      margin-top: 4px;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 99px;
      background: #e6f1fb;
      color: #185fa5;
      align-self: flex-start;
    }

    .tool-card-badge.coming {
      background: #f1efe8;
      color: #9b9b96;
    }

    .donna-footer {
      font-size: 12px;
      color: #9b9b96;
      margin-top: 2rem;
      border-top: 0.5px solid rgba(0,0,0,0.1);
      padding-top: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="donna-wrap">
    <div class="donna-header">
      <div class="donna-wordmark">Donna</div>
      <div class="donna-tagline">I'm Donna, I know everything 😉</div>
    </div>

    <div class="section-label">Tools</div>
    <div class="tool-grid">
      <div class="tool-card">
        <i class="ti ti-clock-exclamation tool-card-icon" aria-hidden="true"></i>
        <div class="tool-card-name">Expiry tracker</div>
        <div class="tool-card-desc">Track food, medicine, and household items before they go bad.</div>
        <span class="tool-card-badge">In progress</span>
      </div>
      <div class="tool-card">
        <i class="ti ti-plus tool-card-icon" aria-hidden="true"></i>
        <div class="tool-card-name">Add a tool</div>
        <div class="tool-card-desc">Your next Donna tool will appear here.</div>
        <span class="tool-card-badge coming">Coming soon</span>
      </div>
    </div>

    <div class="donna-footer">
      Donna &mdash; built for the Su Family &bull; Updated June 2026
    </div>
  </div>
</body>
</html>
